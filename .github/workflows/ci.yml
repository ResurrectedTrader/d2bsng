name: CI

# Cheap clang-format check on every PR. The ~10-minute build + tests live in
# ci-build.yml and run only on a maintainer's `/ci` comment or a manual
# dispatch - so a normal PR doesn't burn a full build, and (because those jobs
# now live in a workflow that doesn't trigger on pull_request) the PR's checks
# list no longer shows them perpetually "Skipped".
on:
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-format-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  format:
    name: Format
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      # Pin clang-format so CI matches local: build.ps1 prefers a PATH
      # clang-format at this version, otherwise an unpinned VS-bundled one drifts
      # between machines. Keep this version in sync with $PINNED_CLANG_FORMAT in build.ps1.
      - name: Install pinned clang-format
        shell: pwsh
        run: pip install "clang-format==20.1.8"
      - name: clang-format check
        shell: pwsh
        run: .\build.ps1 check-format
