name: CI Build

# The expensive (~10-minute) build + tests. Gated so it runs ONLY on a
# maintainer's `/ci` comment on a PR, or a manual dispatch - never on a plain
# pull_request push. Keeping it out of ci.yml (which runs the cheap format check
# on every PR) is what stops a normal PR from showing skipped Build/Tests/Report
# checks: a workflow that doesn't trigger on pull_request contributes no checks
# to the PR at all. Comment-triggered runs don't auto-appear as PR checks, so the
# `report` job posts a `CI / build` commit status back to the PR head explicitly.
on:
  issue_comment:
    types: [created]
  workflow_dispatch:

concurrency:
  group: ci-build-${{ github.event.issue.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  statuses: write       # /ci posts a commit status back to the PR
  pull-requests: read

jobs:
  # Gate: a `/ci` comment from a maintainer, or a manual dispatch. Resolves the
  # PR head commit (issue_comment checks out the default branch by default, so
  # build/tests must target the PR head explicitly) and acknowledges the comment
  # + marks a pending status on the PR.
  prepare:
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.issue.pull_request != null &&
       startsWith(github.event.comment.body, '/ci') &&
       contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association))
    name: Prepare
    runs-on: ubuntu-latest
    outputs:
      ref: ${{ steps.r.outputs.ref }}
      sha: ${{ steps.r.outputs.sha }}
    steps:
      - name: Resolve target + acknowledge
        id: r
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ "${{ github.event_name }}" = "issue_comment" ]; then
            sha=$(gh api "repos/${{ github.repository }}/pulls/${{ github.event.issue.number }}" --jq .head.sha)
            echo "ref=$sha" >> "$GITHUB_OUTPUT"
            echo "sha=$sha" >> "$GITHUB_OUTPUT"
            url="$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
            gh api --silent -X POST "repos/${{ github.repository }}/issues/comments/${{ github.event.comment.id }}/reactions" -f content=rocket || true
            gh api --silent -X POST "repos/${{ github.repository }}/statuses/$sha" -f state=pending -f context="CI / build" -f description="Build + tests running" -f target_url="$url" || true
          else
            echo "ref=${{ github.ref }}" >> "$GITHUB_OUTPUT"
            echo "sha=${{ github.sha }}" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: prepare
    name: Build
    runs-on: windows-latest
    env:
      # vcpkg's ABI-keyed binary cache. Caching THIS (not the vcpkg_installed
      # install tree) is what lets a build reuse prebuilt packages: vcpkg re-runs
      # `install` on every build and rebuilds from source unless it finds a
      # matching archive here.
      VCPKG_DEFAULT_BINARY_CACHE: ${{ github.workspace }}/.vcpkg-cache
      # Pinned vcpkg commit (tool + builtin registry); matches builtin-baseline
      # in vcpkg.json. Bumping it deliberately invalidates the binary cache.
      VCPKG_REF: 74e6536215718009aae747d86d84b78376bf9e09
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.ref }}
          submodules: true   # D2MOO headers only; its external/ submodules are not used
      - name: Restore vcpkg binary cache
        id: vcpkg
        uses: actions/cache/restore@v4
        with:
          path: ${{ env.VCPKG_DEFAULT_BINARY_CACHE }}
          # run_id (+ job) keeps every save key unique so a fresh build always
          # saves; the prefix restore-keys then pick up the most recent cache.
          key: vcpkg-${{ runner.os }}-${{ env.VCPKG_REF }}-${{ hashFiles('vcpkg.json', 'tests/frontends/js/vcpkg.json') }}-${{ github.run_id }}-${{ github.job }}
          restore-keys: |
            vcpkg-${{ runner.os }}-${{ env.VCPKG_REF }}-${{ hashFiles('vcpkg.json', 'tests/frontends/js/vcpkg.json') }}-
            vcpkg-${{ runner.os }}-${{ env.VCPKG_REF }}-
      - name: Set up pinned vcpkg (binary cache + MSBuild manifest restore)
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force $env:VCPKG_DEFAULT_BINARY_CACHE | Out-Null
          # Pin vcpkg (tool + builtin registry) to a fixed commit so the runner
          # image's bundled vcpkg can't drift our ABI hashes / dependency versions
          # out from under the binary cache. VCPKG_REF matches builtin-baseline in
          # vcpkg.json; integrate install from this copy points MSBuild at it.
          $vcpkgDir = "$env:RUNNER_TEMP\vcpkg"
          git clone --quiet https://github.com/microsoft/vcpkg.git $vcpkgDir
          git -C $vcpkgDir checkout --quiet $env:VCPKG_REF
          & "$vcpkgDir\bootstrap-vcpkg.bat" -disableMetrics
          if ($LASTEXITCODE -ne 0) { throw "vcpkg bootstrap failed" }
          & "$vcpkgDir\vcpkg.exe" integrate install
          if ($LASTEXITCODE -ne 0) { throw "vcpkg integrate failed" }
          "VCPKG_ROOT=$vcpkgDir" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
      # V8 monolith libs are not in the repo; seed them once as the v8-14.0.264.0
      # release asset (v8-libs.zip with x86-release/v8_monolith.lib).
      - name: Cache V8 monolith libs
        id: v8
        uses: actions/cache@v4
        with:
          path: dependencies/v8/libs
          key: v8-libs-${{ runner.os }}-14.0.264.0
      - name: Fetch V8 monolith libs
        if: steps.v8.outputs.cache-hit != 'true'
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          New-Item -ItemType Directory -Force dependencies/v8/libs | Out-Null
          gh release download v8-14.0.264.0 --repo $env:GITHUB_REPOSITORY -p v8-libs.zip -O v8-libs.zip
          Expand-Archive -Force v8-libs.zip dependencies/v8/libs
      - name: Build (Release)
        shell: pwsh
        run: .\build.ps1 Release
      # Always save: the key is run_id-unique so it never collides, and we want
      # the freshly-populated binary cache persisted even if a later step fails.
      - name: Save vcpkg binary cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: ${{ env.VCPKG_DEFAULT_BINARY_CACHE }}
          key: ${{ steps.vcpkg.outputs.cache-primary-key }}

  tests:
    name: Tests
    # Serialized after build so the two jobs share one vcpkg build instead of
    # racing into two concurrent cold-cache misses (build the deps twice).
    needs: [prepare, build]
    runs-on: windows-latest
    env:
      VCPKG_DEFAULT_BINARY_CACHE: ${{ github.workspace }}/.vcpkg-cache
      # Pinned vcpkg commit (tool + builtin registry); matches builtin-baseline
      # in vcpkg.json. Bumping it deliberately invalidates the binary cache.
      VCPKG_REF: 74e6536215718009aae747d86d84b78376bf9e09
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.ref }}
          submodules: true
      - name: Restore vcpkg binary cache
        id: vcpkg
        uses: actions/cache/restore@v4
        with:
          path: ${{ env.VCPKG_DEFAULT_BINARY_CACHE }}
          key: vcpkg-${{ runner.os }}-${{ env.VCPKG_REF }}-${{ hashFiles('vcpkg.json', 'tests/frontends/js/vcpkg.json') }}-${{ github.run_id }}-${{ github.job }}
          restore-keys: |
            vcpkg-${{ runner.os }}-${{ env.VCPKG_REF }}-${{ hashFiles('vcpkg.json', 'tests/frontends/js/vcpkg.json') }}-
            vcpkg-${{ runner.os }}-${{ env.VCPKG_REF }}-
      - name: Set up pinned vcpkg (binary cache + MSBuild manifest restore)
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force $env:VCPKG_DEFAULT_BINARY_CACHE | Out-Null
          # Pin vcpkg (tool + builtin registry) to a fixed commit so the runner
          # image's bundled vcpkg can't drift our ABI hashes / dependency versions
          # out from under the binary cache. VCPKG_REF matches builtin-baseline in
          # vcpkg.json; integrate install from this copy points MSBuild at it.
          $vcpkgDir = "$env:RUNNER_TEMP\vcpkg"
          git clone --quiet https://github.com/microsoft/vcpkg.git $vcpkgDir
          git -C $vcpkgDir checkout --quiet $env:VCPKG_REF
          & "$vcpkgDir\bootstrap-vcpkg.bat" -disableMetrics
          if ($LASTEXITCODE -ne 0) { throw "vcpkg bootstrap failed" }
          & "$vcpkgDir\vcpkg.exe" integrate install
          if ($LASTEXITCODE -ne 0) { throw "vcpkg integrate failed" }
          "VCPKG_ROOT=$vcpkgDir" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
      # The test exe links no V8, so no V8 fetch here.
      - name: Build + run tests
        shell: pwsh
        run: .\build.ps1 test
      - name: Save vcpkg binary cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: ${{ env.VCPKG_DEFAULT_BINARY_CACHE }}
          key: ${{ steps.vcpkg.outputs.cache-primary-key }}

  # Post the final build+tests result back onto the PR (comment-triggered runs
  # don't auto-appear as PR checks, so we set a commit status explicitly).
  report:
    needs: [prepare, build, tests]
    if: always() && github.event_name == 'issue_comment'
    name: Report
    runs-on: ubuntu-latest
    steps:
      - name: Set commit status
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ "${{ needs.build.result }}" = "success" ] && [ "${{ needs.tests.result }}" = "success" ]; then
            state=success; desc="Build + tests passed"
          else
            state=failure; desc="Build + tests failed"
          fi
          url="$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
          gh api --silent -X POST "repos/${{ github.repository }}/statuses/${{ needs.prepare.outputs.sha }}" -f state=$state -f context="CI / build" -f description="$desc" -f target_url="$url" || true
