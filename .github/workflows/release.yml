name: Release

# Manual only (Actions -> Release -> Run workflow). Computes the next version
# ONCE, bakes it into the DLL, builds + tests, then - if both pass - tags that
# version and publishes d2bs.dll + .pdb + d2bsng.d.ts, then deploys the docs.
#
# The version is decided up front (the `version` job) and reused for both the
# baked-in D2BS_VERSION and the git tag, so they can never drift. The release
# concurrency group below serializes runs (cancel-in-progress: false).
on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump (ignored for the first release, which is always 2.0.0)"
        type: choice
        options: [patch, minor, major]
        default: patch

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  version:
    name: Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Compute next version
        id: v
        run: |
          # Only consider strict vX.Y.Z tags (ignores the v8-... libs tag).
          # `|| true`: grep exits 1 when no vX.Y.Z tag exists yet (first release).
          latest=$(git tag | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | sort -V | tail -1 || true)
          if [ -z "$latest" ]; then
            # First d2bsng release starts at 2.0.0 - legacy d2bs topped out at
            # 1.6.x, so 2.x lets scripts identify they're running d2bsng.
            echo "version=2.0.0" >> "$GITHUB_OUTPUT"
          else
            # bump: from the manual dispatch input; empty (push trigger) -> patch.
            bump="${{ inputs.bump }}"; bump="${bump:-patch}"
            IFS='.' read -r major minor patch <<< "${latest#v}"
            case "$bump" in
              major) major=$((major + 1)); minor=0; patch=0 ;;
              minor) minor=$((minor + 1)); patch=0 ;;
              *)     patch=$((patch + 1)) ;;
            esac
            echo "version=${major}.${minor}.${patch}" >> "$GITHUB_OUTPUT"
          fi

  build:
    name: Build
    needs: version
    runs-on: windows-latest
    env:
      # vcpkg's ABI-keyed binary cache. Caching THIS (not the vcpkg_installed
      # install tree) is what lets a build reuse prebuilt packages: vcpkg re-runs
      # `install` on every build and rebuilds from source unless it finds a
      # matching archive here.
      VCPKG_DEFAULT_BINARY_CACHE: ${{ github.workspace }}/.vcpkg-cache
      # Pinned vcpkg commit (tool + builtin registry); matches builtin-baseline
      # in vcpkg.json. Bumping it deliberately invalidates the binary cache.
      VCPKG_REF: 74e6536215718009aae747d86d84b78376bf9e09
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true   # D2MOO headers only; its external/ submodules are not used
      - name: Restore vcpkg binary cache
        id: vcpkg
        uses: actions/cache/restore@v4
        with:
          path: ${{ env.VCPKG_DEFAULT_BINARY_CACHE }}
          # run_id (+ job) keeps every save key unique so a fresh build always
          # saves; the prefix restore-keys then pick up the most recent cache.
          key: vcpkg-${{ runner.os }}-${{ env.VCPKG_REF }}-${{ hashFiles('vcpkg.json', 'tests/frontends/js/vcpkg.json') }}-${{ github.run_id }}-${{ github.job }}
          restore-keys: |
            vcpkg-${{ runner.os }}-${{ env.VCPKG_REF }}-${{ hashFiles('vcpkg.json', 'tests/frontends/js/vcpkg.json') }}-
            vcpkg-${{ runner.os }}-${{ env.VCPKG_REF }}-
      - name: Set up pinned vcpkg (binary cache + MSBuild manifest restore)
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force $env:VCPKG_DEFAULT_BINARY_CACHE | Out-Null
          # Pin vcpkg (tool + builtin registry) to a fixed commit so the runner
          # image's bundled vcpkg can't drift our ABI hashes / dependency versions
          # out from under the binary cache. VCPKG_REF matches builtin-baseline in
          # vcpkg.json; integrate install from this copy points MSBuild at it.
          $vcpkgDir = "$env:RUNNER_TEMP\vcpkg"
          git clone --quiet https://github.com/microsoft/vcpkg.git $vcpkgDir
          git -C $vcpkgDir checkout --quiet $env:VCPKG_REF
          & "$vcpkgDir\bootstrap-vcpkg.bat" -disableMetrics
          if ($LASTEXITCODE -ne 0) { throw "vcpkg bootstrap failed" }
          & "$vcpkgDir\vcpkg.exe" integrate install
          if ($LASTEXITCODE -ne 0) { throw "vcpkg integrate failed" }
          "VCPKG_ROOT=$vcpkgDir" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
      # V8 monolith libs are not in the repo; seed them once as the v8-14.0.264.0
      # release asset (v8-libs.zip with x86-release/v8_monolith.lib).
      - name: Cache V8 monolith libs
        id: v8
        uses: actions/cache@v4
        with:
          path: dependencies/v8/libs
          key: v8-libs-${{ runner.os }}-14.0.264.0
      - name: Fetch V8 monolith libs
        if: steps.v8.outputs.cache-hit != 'true'
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          New-Item -ItemType Directory -Force dependencies/v8/libs | Out-Null
          gh release download v8-14.0.264.0 --repo $env:GITHUB_REPOSITORY -p v8-libs.zip -O v8-libs.zip
          Expand-Archive -Force v8-libs.zip dependencies/v8/libs
      - name: Build (Release)
        shell: pwsh
        run: .\build.ps1 Release -Version ${{ needs.version.outputs.version }}
      # Save vcpkg's binary cache right after the build populates it. Always
      # save: the run_id-unique key never collides, and we want the cache kept
      # even if a later step (doc-gen, upload) fails.
      - name: Save vcpkg binary cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: ${{ env.VCPKG_DEFAULT_BINARY_CACHE }}
          key: ${{ steps.vcpkg.outputs.cache-primary-key }}
      # Extract the API surface (needs libclang + the just-restored vcpkg/V8
      # includes) and render d2bsng.d.ts. api.json + d.ts ship as release
      # assets; the docs site is assembled later (deploy-docs) from all releases.
      - name: Generate API JSON + d.ts
        shell: pwsh
        run: |
          pip install --quiet libclang
          python scripts/extract_api.py -o api.json
          python scripts/gen_dts.py api.json -o Release/d2bsng.d.ts --version "${{ needs.version.outputs.version }}"
          Copy-Item api.json Release/api.json
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: d2bs-binaries
          path: |
            Release/d2bs.dll
            Release/d2bs.pdb
            Release/d2bsng.d.ts
            Release/api.json
          retention-days: 1
          if-no-files-found: error

  tests:
    name: Tests
    # Serialized after build so the two jobs share one vcpkg build instead of
    # racing into two concurrent cold-cache misses (build the deps twice).
    needs: build
    runs-on: windows-latest
    env:
      VCPKG_DEFAULT_BINARY_CACHE: ${{ github.workspace }}/.vcpkg-cache
      # Pinned vcpkg commit (tool + builtin registry); matches builtin-baseline
      # in vcpkg.json. Bumping it deliberately invalidates the binary cache.
      VCPKG_REF: 74e6536215718009aae747d86d84b78376bf9e09
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - name: Restore vcpkg binary cache
        id: vcpkg
        uses: actions/cache/restore@v4
        with:
          path: ${{ env.VCPKG_DEFAULT_BINARY_CACHE }}
          key: vcpkg-${{ runner.os }}-${{ env.VCPKG_REF }}-${{ hashFiles('vcpkg.json', 'tests/frontends/js/vcpkg.json') }}-${{ github.run_id }}-${{ github.job }}
          restore-keys: |
            vcpkg-${{ runner.os }}-${{ env.VCPKG_REF }}-${{ hashFiles('vcpkg.json', 'tests/frontends/js/vcpkg.json') }}-
            vcpkg-${{ runner.os }}-${{ env.VCPKG_REF }}-
      - name: Set up pinned vcpkg (binary cache + MSBuild manifest restore)
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force $env:VCPKG_DEFAULT_BINARY_CACHE | Out-Null
          # Pin vcpkg (tool + builtin registry) to a fixed commit so the runner
          # image's bundled vcpkg can't drift our ABI hashes / dependency versions
          # out from under the binary cache. VCPKG_REF matches builtin-baseline in
          # vcpkg.json; integrate install from this copy points MSBuild at it.
          $vcpkgDir = "$env:RUNNER_TEMP\vcpkg"
          git clone --quiet https://github.com/microsoft/vcpkg.git $vcpkgDir
          git -C $vcpkgDir checkout --quiet $env:VCPKG_REF
          & "$vcpkgDir\bootstrap-vcpkg.bat" -disableMetrics
          if ($LASTEXITCODE -ne 0) { throw "vcpkg bootstrap failed" }
          & "$vcpkgDir\vcpkg.exe" integrate install
          if ($LASTEXITCODE -ne 0) { throw "vcpkg integrate failed" }
          "VCPKG_ROOT=$vcpkgDir" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
      # The test exe links no V8, so no V8 fetch here.
      - name: Build + run tests
        shell: pwsh
        run: .\build.ps1 test
      - name: Save vcpkg binary cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: ${{ env.VCPKG_DEFAULT_BINARY_CACHE }}
          key: ${{ steps.vcpkg.outputs.cache-primary-key }}

  deploy-docs:
    name: Deploy docs
    # Runs after release so the just-published version's api.json asset exists.
    # Gathers every release's api.json server-side (no rate limits) into a
    # same-origin bundle the static page reads - no runtime GitHub API calls.
    needs: [release]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Build docs site from releases
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api "repos/${{ github.repository }}/releases" --paginate > releases.json
          python3 scripts/build_docs_site.py \
            --releases releases.json --data-dir data --out site \
            --repo "${{ github.repository }}" --download
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4

  release:
    name: Release
    needs: [version, build, tests]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: d2bs-binaries
          path: dist
      - name: Tag + GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          v="v${{ needs.version.outputs.version }}"
          repo_url="${{ github.server_url }}/${{ github.repository }}"

          # Previous vX.Y.Z tag - computed BEFORE we create this release's tag, so
          # `tail -1` is the prior release and not the one we are about to make.
          # Empty on the first release. (Same vX.Y.Z-only filter as the version job,
          # ignoring the v8-... libs tag.)
          prev=$(git tag | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | sort -V | tail -1 || true)

          # We push straight to master, so there are no PRs for `--generate-notes`
          # to summarize - it would produce empty notes. Build the notes ourselves
          # from the commits since the previous tag, each linking to its commit.
          # The format (a `-` list of `[`hash`](url)` links + a bare compare URL)
          # renders on both the GitHub release page and the docs Changelog, whose
          # minimal markdown renderer (scripts/gen_api_docs.py `md()`) supports
          # lists, inline code, [text](url) links, and bare-URL autolinking.
          bt='`'
          fmt="- %s ([${bt}%h${bt}](${repo_url}/commit/%H))"
          range="HEAD"
          [ -n "$prev" ] && range="${prev}..HEAD"
          {
            echo "## Commits"
            echo
            git log --no-merges --pretty=format:"$fmt" "$range"
            echo
            if [ -n "$prev" ]; then
              echo
              echo "**Full Changelog**: ${repo_url}/compare/${prev}...${v}"
            fi
          } > notes.md

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "$v"
          git push origin "$v"
          gh release create "$v" --notes-file notes.md --title "$v" \
            "dist/d2bs.dll#d2bs.dll" \
            "dist/d2bs.pdb#d2bs.pdb" \
            "dist/d2bsng.d.ts#d2bsng.d.ts" \
            "dist/api.json#api.json"
